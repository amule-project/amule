name: I18n CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  pofiles:
    name: Translation checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Installing tools
        run: sudo apt-get install gettext

      - name: Checking .po files
        run: |
          for po in po/*.po docs/man/po/*.po; do
            msgfmt --check --statistics --verbose $po
          done

  pot-sync:
    name: App catalogs in sync with source
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Installing tools
        run: sudo apt-get install -y gettext

      - name: Regenerate pot + merge into po
        run: ./scripts/update-po.sh

      - name: Verify no real content drift
        run: |
          # xgettext / msgmerge always rewrite a few volatile header
          # lines (POT-Creation-Date, PO-Revision-Date, Last-Translator,
          # Language-Team) and re-flow source-reference comments
          # (#: file:lineno) on any source-code line shift, even when
          # no msgid / msgstr actually changed. Run msgcat --no-wrap on
          # both sides to neutralise any incidental wrapping (project
          # policy is --no-wrap, but normalising defensively keeps this
          # check robust to a translator using a tool that re-wraps),
          # then strip those metadata lines before diffing.
          drift=0
          for po in po/amule.pot po/*.po; do
            diff <(git show HEAD:"$po" | msgcat --no-wrap - \
                     | grep -vE '^("(POT-Creation-Date|PO-Revision-Date|Last-Translator|Language-Team)|#: )') \
                 <(msgcat --no-wrap "$po" \
                     | grep -vE '^("(POT-Creation-Date|PO-Revision-Date|Last-Translator|Language-Team)|#: )') \
              > /tmp/po-drift.txt || drift=1
            if [ -s /tmp/po-drift.txt ]; then
              echo "::error file=$po::content drift detected"
              echo "----- $po -----"
              cat /tmp/po-drift.txt
            fi
          done
          if [ "$drift" -ne 0 ]; then
            echo
            echo "::error::App translation catalogs out of sync with source."
            echo "Run scripts/update-po.sh locally and commit the result."
            exit 1
          fi

  manpages-pot-sync:
    name: Manpage catalogs in sync with English masters
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Installing tools
        run: sudo apt-get install -y gettext po4a

      - name: Regenerate manpages.pot + merge into manpages-*.po
        run: ./scripts/update-manpages-po.sh

      - name: Verify no real content drift
        run: |
          # Mirror of the pot-sync check above. po4a / msgmerge always
          # rewrite POT-Creation-Date and the source-reference comments
          # (#:) even when no msgid actually changed, so strip those
          # before diffing. msgcat --no-wrap normalises any incidental
          # wrapping a translator's tool may have introduced.
          drift=0
          for po in docs/man/po/manpages.pot docs/man/po/manpages-*.po; do
            diff <(git show HEAD:"$po" | msgcat --no-wrap - \
                     | grep -vE '^("(POT-Creation-Date|PO-Revision-Date|Last-Translator|Language-Team)|#: )') \
                 <(msgcat --no-wrap "$po" \
                     | grep -vE '^("(POT-Creation-Date|PO-Revision-Date|Last-Translator|Language-Team)|#: )') \
              > /tmp/po-drift.txt || drift=1
            if [ -s /tmp/po-drift.txt ]; then
              echo "::error file=$po::content drift detected"
              echo "----- $po -----"
              cat /tmp/po-drift.txt
            fi
          done
          if [ "$drift" -ne 0 ]; then
            echo
            echo "::error::Manpage translation catalogs out of sync with English masters."
            echo "Run scripts/update-manpages-po.sh locally and commit the result."
            exit 1
          fi
